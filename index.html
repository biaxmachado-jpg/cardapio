<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Cardápio da Casa</title>
<link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;700&family=DM+Sans:wght@400;600;700&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:#F2F5EE;color:#1E2D1E;min-height:100vh}

/* ── Header ── */
header{background:#2D4A2D;padding:0 20px;display:flex;align-items:center;justify-content:space-between;min-height:60px;position:sticky;top:0;z-index:100;box-shadow:0 2px 12px rgba(0,0,0,.25);gap:10px;flex-wrap:wrap;padding-top:6px;padding-bottom:6px}
.logo{display:flex;align-items:center;gap:8px;flex-shrink:0}
.logo svg{color:#B8D4A0}
.logo-text{font-family:'Lora',serif;font-size:17px;font-weight:700;color:#E8F0DC}
nav{display:flex;gap:3px;flex-wrap:wrap}
.nav-btn{padding:7px 13px;border-radius:20px;border:none;cursor:pointer;font-size:12px;font-weight:700;font-family:'DM Sans',sans-serif;background:transparent;color:#B8D4A0;transition:all .2s;display:flex;align-items:center;gap:5px;white-space:nowrap}
.nav-btn.active{background:#B8D4A0;color:#1E2D1E}
.header-right{display:flex;gap:6px;align-items:center}
.admin-pill{background:#F0C44A;color:#1E2D1E;padding:5px 12px;border-radius:20px;font-size:11px;font-weight:700;display:flex;align-items:center;gap:5px}
.btn-admin-login{padding:6px 12px;border-radius:20px;border:1.5px solid #B8D4A0;background:transparent;color:#B8D4A0;cursor:pointer;font-size:11px;font-weight:700;font-family:'DM Sans',sans-serif;display:flex;align-items:center;gap:4px}
.btn-save{padding:6px 14px;border-radius:20px;border:none;background:#78B060;color:#fff;cursor:pointer;font-size:11px;font-weight:700;font-family:'DM Sans',sans-serif;display:flex;align-items:center;gap:4px}
.btn-save:disabled{opacity:.5;cursor:not-allowed}

/* ── Main ── */
main{padding:22px 18px;max-width:980px;margin:0 auto}
h1{font-family:'Lora',serif;font-size:22px;color:#1E2D1E;margin-bottom:4px}
.subtitle{font-size:13px;color:#5A7A5A;margin-bottom:22px}
.loading{text-align:center;padding:60px 0;color:#5A7A5A;font-size:14px}
.spinner{width:32px;height:32px;border:3px solid #D0DCC5;border-top-color:#78B060;border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 14px}
@keyframes spin{to{transform:rotate(360deg)}}
.hidden{display:none!important}

/* ── Cardápio ── */
.cards-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:16px}
.day-card{background:#FAFAF5;border-radius:14px;overflow:hidden;box-shadow:0 2px 10px rgba(0,0,0,.06);border:1px solid #E2EBD8}
.card-hd{padding:14px 18px;display:flex;justify-content:space-between;align-items:flex-start}
.card-cook{font-size:10px;font-weight:700;color:rgba(255,255,255,.7);letter-spacing:1px;text-transform:uppercase;margin-bottom:3px}
.card-day{font-family:'Lora',serif;font-size:16px;color:#fff;font-weight:700}
.card-serves{font-size:10px;color:rgba(255,255,255,.65);margin-top:3px}
.card-edit-btn{background:none;border:1.5px solid rgba(255,255,255,.4);border-radius:7px;color:#fff;padding:4px 9px;cursor:pointer;font-size:10px;font-family:'DM Sans',sans-serif;font-weight:700;white-space:nowrap}
.card-bd{padding:14px 18px}
.recipe-item{display:flex;align-items:flex-start;gap:9px;padding:9px 0;border-bottom:1px solid #EEF2E8}
.recipe-item:last-of-type{border-bottom:none}
.rdot{width:6px;height:6px;border-radius:50%;margin-top:5px;flex-shrink:0}
.rname{font-size:13px;font-weight:700;color:#1E2D1E;margin-bottom:3px}
.rnotes{font-size:11px;color:#7A9A7A;font-style:italic;margin-top:2px;line-height:1.4}
.rlink{font-size:11px;color:#78B060;display:inline-flex;align-items:center;gap:3px;text-decoration:none;margin-top:3px}
.rlink:hover{text-decoration:underline}
.tags-row{display:flex;gap:3px;flex-wrap:wrap;margin-bottom:3px}
.tag{padding:2px 7px;border-radius:20px;font-size:10px;font-weight:700;color:#fff}
.note-box{margin-top:10px;padding:8px 12px;background:#F0F5E8;border-radius:8px;font-size:12px;color:#3D5C3D;border-left:3px solid #78B060;line-height:1.5}
.empty-slot{padding:14px;text-align:center;color:#B0C8B0;font-size:13px;font-style:italic}

/* ── Receitas ── */
.page-hd{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:4px;gap:10px;flex-wrap:wrap}
.btn-add{display:flex;align-items:center;gap:6px;padding:8px 16px;background:#2D4A2D;color:#B8D4A0;border:none;border-radius:9px;cursor:pointer;font-size:12px;font-weight:700;font-family:'DM Sans',sans-serif;flex-shrink:0}
.filter-bar{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:16px}
.filter-chip{padding:5px 12px;border-radius:20px;border:1.5px solid #D0DCC5;background:#fff;cursor:pointer;font-size:11px;font-weight:700;font-family:'DM Sans',sans-serif;color:#5A7A5A;transition:all .2s}
.filter-chip.active{background:#2D4A2D;border-color:#2D4A2D;color:#B8D4A0}
.recipes-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(210px,1fr));gap:12px;margin-top:4px}
.recipe-card{background:#FAFAF5;border:1px solid #E2EBD8;border-radius:12px;padding:14px;display:flex;flex-direction:column;gap:7px}
.rc-hd{display:flex;justify-content:space-between;align-items:flex-start;gap:7px}
.rc-name{font-size:13px;font-weight:700;color:#1E2D1E;line-height:1.3;flex:1}
.btn-del{background:none;border:none;cursor:pointer;color:#C07A7A;padding:2px;flex-shrink:0}
.no-link{font-size:11px;color:#9AB89A}

/* ── Tag Manager ── */
.tag-manager{background:#FAFAF5;border:1px solid #E2EBD8;border-radius:12px;padding:16px;margin-bottom:20px}
.tag-manager-title{font-size:12px;font-weight:700;color:#5A7A5A;letter-spacing:.5px;margin-bottom:10px;text-transform:uppercase}
.tags-list{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px}
.tag-item{display:flex;align-items:center;gap:4px;padding:4px 10px;border-radius:20px;font-size:11px;font-weight:700;color:#fff}
.tag-del-btn{background:none;border:none;cursor:pointer;color:rgba(255,255,255,.8);line-height:1;padding:0;font-size:14px;margin-left:2px}
.add-tag-row{display:flex;gap:6px;align-items:center;flex-wrap:wrap}
.tag-name-input{padding:6px 12px;border:1.5px solid #D0DCC5;border-radius:8px;font-size:12px;font-family:'DM Sans',sans-serif;background:#F8FAF5;color:#1E2D1E;outline:none;width:140px}
.tag-color-input{width:36px;height:30px;border:1.5px solid #D0DCC5;border-radius:6px;cursor:pointer;padding:2px}
.btn-sm{padding:6px 14px;border-radius:8px;border:none;background:#2D4A2D;color:#B8D4A0;cursor:pointer;font-size:11px;font-weight:700;font-family:'DM Sans',sans-serif}

/* ── Shopping ── */
.shop-tabs{display:flex;gap:8px;margin-bottom:18px;flex-wrap:wrap}
.shop-tab{padding:8px 18px;border-radius:20px;border:1.5px solid #D0DCC5;background:#fff;cursor:pointer;font-size:13px;font-weight:700;font-family:'DM Sans',sans-serif;color:#5A7A5A;transition:all .2s}
.shop-tab.active{background:#2D4A2D;border-color:#2D4A2D;color:#B8D4A0}
.shop-controls{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:18px}
.sctrl{padding:8px 14px;border-radius:20px;border:1.5px solid #D0DCC5;background:#fff;cursor:pointer;font-size:12px;font-weight:700;font-family:'DM Sans',sans-serif;color:#5A7A5A;display:flex;align-items:center;gap:5px;transition:all .2s;white-space:nowrap}
.sctrl.primary{background:#2D4A2D;border-color:#2D4A2D;color:#B8D4A0}
.sctrl.orange{background:#E8841A;border-color:#E8841A;color:#fff}
.sctrl.send{background:#25A244;border-color:#25A244;color:#fff;font-size:13px;padding:9px 18px;border-radius:20px}
.shop-category{background:#FAFAF5;border:1px solid #E2EBD8;border-radius:12px;overflow:hidden;margin-bottom:10px}
.shop-cat-hd{padding:11px 15px;background:#EEF5E4;font-size:13px;font-weight:700;color:#2D4A2D;display:flex;align-items:center;justify-content:space-between;cursor:pointer;user-select:none}
.shop-cat-count{font-size:11px;color:#78B060;font-weight:600}
.shop-items{padding:6px 0}
.shop-item{display:flex;align-items:center;gap:10px;padding:9px 15px;border-bottom:1px solid #F0F5E8;transition:background .15s}
.shop-item:last-child{border-bottom:none}
.shop-item.checked{background:#F0FFF0}
.shop-item.checked .iname{text-decoration:line-through;color:#A0B8A0}
.ichk{width:22px;height:22px;border-radius:7px;border:2px solid #C0D0B0;background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .15s}
.ichk.on{background:#78B060;border-color:#78B060}
.iname{font-size:14px;font-weight:600;color:#1E2D1E;flex:1;line-height:1.3}
.iqty{font-size:12px;color:#7A9A7A;white-space:nowrap}
.iqty-input{font-size:12px;color:#2D4A2D;border:1.5px solid #D0DCC5;border-radius:7px;padding:3px 8px;font-family:'DM Sans',sans-serif;width:130px;background:#F8FAF5;outline:none}
.idel{background:none;border:none;cursor:pointer;color:#C07A7A;padding:2px;flex-shrink:0}
.add-item-row{display:flex;gap:6px;padding:9px 15px;border-top:1px solid #EEF2E8;flex-wrap:wrap}
.aii{flex:1;min-width:100px;padding:7px 11px;border:1.5px solid #D0DCC5;border-radius:8px;font-size:12px;font-family:'DM Sans',sans-serif;background:#F8FAF5;color:#1E2D1E;outline:none}
.aiq{width:100px;padding:7px 10px;border:1.5px solid #D0DCC5;border-radius:8px;font-size:12px;font-family:'DM Sans',sans-serif;background:#F8FAF5;color:#1E2D1E;outline:none}
.aib{padding:7px 14px;background:#2D4A2D;color:#B8D4A0;border:none;border-radius:8px;cursor:pointer;font-size:12px;font-weight:700;font-family:'DM Sans',sans-serif}

/* ── Generated list ── */
.gen-list{background:#FAFAF5;border:2px solid #25A244;border-radius:14px;padding:20px;margin-top:20px}
.gen-hd{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:16px;gap:10px;flex-wrap:wrap}
.gen-title{font-family:'Lora',serif;font-size:18px;color:#2D4A2D}
.gen-date{font-size:12px;color:#7A9A7A;margin-top:3px}
.gen-cat{margin-bottom:14px}
.gen-cat-name{font-size:11px;font-weight:700;color:#78B060;letter-spacing:.5px;text-transform:uppercase;margin-bottom:6px}
.gen-item{display:flex;justify-content:space-between;padding:5px 0;border-bottom:1px solid #EEF2E8;font-size:13px}
.gen-item:last-child{border-bottom:none}
.gen-qty{color:#7A9A7A;font-size:12px}
.gen-actions{display:flex;gap:8px;flex-wrap:wrap}
.btn-print{padding:7px 16px;background:#2D4A2D;color:#B8D4A0;border:none;border-radius:9px;cursor:pointer;font-size:12px;font-weight:700;font-family:'DM Sans',sans-serif;display:flex;align-items:center;gap:5px}
.sending-msg{font-size:12px;color:#25A244;font-weight:600;display:flex;align-items:center;gap:5px;margin-top:10px}
.empty-gen{text-align:center;padding:20px;color:#9AB89A;font-style:italic;font-size:13px}

/* ── Modals ── */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(20,30,20,.75);z-index:1000;align-items:center;justify-content:center;padding:16px;backdrop-filter:blur(4px)}
.modal-overlay.open{display:flex}
.modal{background:#FAFAF5;border-radius:14px;width:100%;max-width:520px;max-height:90vh;overflow:auto;box-shadow:0 20px 50px rgba(0,0,0,.3)}
.modal-hd{padding:16px 20px;border-bottom:1px solid #E8EDE0;display:flex;justify-content:space-between;align-items:center}
.modal-title{font-family:'Lora',serif;font-size:16px;color:#1E2D1E}
.modal-close{background:none;border:none;cursor:pointer;color:#7A9A7A;padding:4px;font-size:20px;line-height:1}
.modal-bd{padding:20px}
.fgroup{margin-bottom:14px}
label{font-size:11px;font-weight:700;color:#5A7A5A;letter-spacing:.5px;margin-bottom:5px;display:block;text-transform:uppercase}
input[type=text],input[type=url],input[type=password],textarea,select{width:100%;padding:9px 12px;border:1.5px solid #D0DCC5;border-radius:9px;font-size:13px;font-family:'DM Sans',sans-serif;background:#F8FAF5;color:#1E2D1E;outline:none}
input:focus,textarea:focus,select:focus{border-color:#78B060}
textarea{height:70px;resize:vertical;line-height:1.5}
.modal-save-btn{width:100%;padding:11px;background:#2D4A2D;color:#B8D4A0;border:none;border-radius:9px;cursor:pointer;font-size:13px;font-weight:700;font-family:'DM Sans',sans-serif;margin-top:8px}
.check-list{max-height:240px;overflow-y:auto;margin-bottom:12px}
.chk-item{display:flex;align-items:center;gap:9px;padding:8px 11px;border-radius:9px;cursor:pointer;background:#F2F5EE;border:1.5px solid #E2EBD8;margin-bottom:6px;transition:all .15s}
.chk-item.sel{background:#EAF3E0;border-color:#78B060}
.chkbox{width:17px;height:17px;border-radius:4px;border:2px solid #C0D0B0;background:transparent;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.chk-item.sel .chkbox{background:#78B060;border-color:#78B060}
.pin-input{text-align:center;letter-spacing:8px;font-size:22px;font-weight:700}
.pin-err{color:#C07A7A;font-size:12px;margin-top:6px;text-align:center}
.tags-select{display:flex;gap:5px;flex-wrap:wrap;margin-top:6px}
.tag-sel-chip{padding:4px 10px;border-radius:20px;font-size:11px;font-weight:700;cursor:pointer;border:2px solid transparent;color:#fff;opacity:.6;transition:all .15s}
.tag-sel-chip.sel{opacity:1;border-color:#fff}

/* ── Toast ── */
.toast{position:fixed;bottom:18px;left:50%;transform:translateX(-50%);background:#2D4A2D;color:#B8D4A0;padding:10px 22px;border-radius:20px;font-size:13px;font-weight:700;font-family:'DM Sans',sans-serif;box-shadow:0 6px 20px rgba(0,0,0,.3);z-index:2000;opacity:0;transition:opacity .3s;pointer-events:none;white-space:nowrap}
.toast.show{opacity:1}

@media(max-width:600px){
  header{padding:8px 12px}
  .logo-text{font-size:14px}
  main{padding:14px 12px}
  .nav-btn{font-size:11px;padding:6px 9px}
  .iname{font-size:13px}
}
@media print{
  header,.shop-controls,.shop-tabs,.sctrl,.btn-print,.btn-admin-login,.nav-btn,.gen-actions{display:none!important}
  .gen-list{border:none;padding:0}
}
</style>
</head>
<body>

<header>
  <div class="logo">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 20A7 7 0 0 1 9.8 6.1C15.5 5 17 4.48 19 2c1 2 2 4.18 2 8 0 5.5-4.78 10-10 10z"/><path d="M2 21c0-3 1.85-5.36 5.08-6C9.5 14.52 12 13 13 12"/></svg>
    <span class="logo-text">Cardápio da Casa</span>
  </div>
  <nav>
    <button class="nav-btn active" id="btn-cardapio" onclick="switchView('cardapio')">📅 Cardápio</button>
    <button class="nav-btn" id="btn-receitas" onclick="switchView('receitas')">📖 Receitas</button>
    <button class="nav-btn" id="btn-compras" onclick="switchView('compras')">🛒 Compras</button>
  </nav>
  <div class="header-right">
    <div class="admin-pill hidden" id="admin-pill">👑 Admin</div>
    <button class="btn-admin-login" id="btn-admin" onclick="openPin()">🔐 Admin</button>
    <button class="btn-save hidden" id="btn-save" onclick="saveData()">💾 Salvar</button>
  </div>
</header>

<main>

<!-- ── Cardápio ── -->
<div id="view-cardapio">
  <h1>Cardápio Semanal</h1>
  <p class="subtitle">Jantar para a família · cada preparo cobre 2 noites</p>
  <div id="loading-c" class="loading"><div class="spinner"></div>Carregando...</div>
  <div class="cards-grid hidden" id="cards-grid"></div>
</div>

<!-- ── Receitas ── -->
<div id="view-receitas" class="hidden">
  <div class="page-hd">
    <div><h1>Banco de Receitas</h1><p class="subtitle" id="r-count"></p></div>
    <button class="btn-add hidden" id="btn-add-recipe" onclick="openAddRecipe()">+ Nova receita</button>
  </div>
  <div id="tag-manager-area"></div>
  <div class="filter-bar" id="filter-bar">
    <button class="filter-chip active" data-tag="todos" onclick="filterByTag('todos',this)">Todas</button>
  </div>
  <div class="recipes-grid" id="recipes-grid"></div>
</div>

<!-- ── Compras ── -->
<div id="view-compras" class="hidden">
  <h1>Lista de Compras</h1>
  <p class="subtitle">Marque o que precisa, depois clique em <strong>Gerar e Enviar</strong></p>
  <div class="shop-tabs">
    <button class="shop-tab active" id="tab-semanal" onclick="switchShopTab('semanal')">🛒 Semanal</button>
    <button class="shop-tab" id="tab-mensal" onclick="switchShopTab('mensal')">📦 Mensal</button>
  </div>
  <div class="shop-controls">
    <button class="sctrl" onclick="checkAll()">✅ Marcar tudo</button>
    <button class="sctrl" onclick="uncheckAll()">✖ Desmarcar</button>
    <button class="sctrl orange" onclick="resetChecks()">🔄 Resetar</button>
    <button class="sctrl send" onclick="generateAndSend()">📲 Gerar e Enviar para Bia</button>
  </div>
  <div id="shop-container"></div>
  <div id="gen-container"></div>
</div>

</main>

<!-- ── Modal PIN ── -->
<div class="modal-overlay" id="m-pin">
  <div class="modal">
    <div class="modal-hd"><span class="modal-title">🔐 Acesso Admin</span><button class="modal-close" onclick="closeModal('m-pin')">×</button></div>
    <div class="modal-bd">
      <div class="fgroup">
        <label>PIN de 4 dígitos</label>
        <input type="password" id="pin-inp" class="pin-input" maxlength="4" placeholder="••••" oninput="this.value=this.value.replace(/\D/g,'')" onkeydown="if(event.key==='Enter')checkPin()"/>
        <div class="pin-err hidden" id="pin-err">PIN incorreto. Tente novamente.</div>
      </div>
      <button class="modal-save-btn" onclick="checkPin()">Entrar como Admin</button>
    </div>
  </div>
</div>

<!-- ── Modal Add/Edit Recipe ── -->
<div class="modal-overlay" id="m-recipe">
  <div class="modal">
    <div class="modal-hd"><span class="modal-title" id="m-recipe-title">Nova Receita</span><button class="modal-close" onclick="closeModal('m-recipe')">×</button></div>
    <div class="modal-bd">
      <input type="hidden" id="edit-recipe-id"/>
      <div class="fgroup"><label>Nome da receita *</label><input type="text" id="r-name" placeholder="Ex: Frango ao limão com alecrim"/></div>
      <div class="fgroup"><label>Link da receita (se tiver)</label><input type="url" id="r-url" placeholder="https://..."/></div>
      <div class="fgroup"><label>Observações / modo de preparo</label><textarea id="r-notes" placeholder="Ingredientes, dicas, tempo de preparo..."></textarea></div>
      <div class="fgroup">
        <label>Marcadores</label>
        <div class="tags-select" id="tag-selector"></div>
      </div>
      <button class="modal-save-btn" onclick="saveRecipe()">Salvar receita</button>
    </div>
  </div>
</div>

<!-- ── Modal Edit Menu ── -->
<div class="modal-overlay" id="m-menu">
  <div class="modal">
    <div class="modal-hd"><span class="modal-title" id="m-menu-title">Montar cardápio</span><button class="modal-close" onclick="closeModal('m-menu')">×</button></div>
    <div class="modal-bd">
      <label style="margin-bottom:10px">Selecione as receitas do dia</label>
      <div class="check-list" id="recipe-checklist"></div>
      <div class="fgroup"><label>Observação para a cozinheira</label><textarea id="menu-note" placeholder="Ex: Deixar o frango marinando desde cedo..."></textarea></div>
      <button class="modal-save-btn" onclick="saveMenu()">Salvar cardápio</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ────────────────────────────────────────────────────────────────────────────
// CONFIG
// ────────────────────────────────────────────────────────────────────────────
const GIST_ID    = '758c5de4aa596fbe88fe27622e396597';
const GH_TOKEN   = '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';
const GIST_API   = `https://api.github.com/gists/${GIST_ID}`;
const WH_LISTA   = 'https://n8n.bian8n.cloud/webhook/enviar-lista-compras';
const ADMIN_PIN  = '2580'; // ← Mude o PIN aqui!

// ────────────────────────────────────────────────────────────────────────────
// GIST
// ────────────────────────────────────────────────────────────────────────────
async function loadFromGist(){
  try{
    const res=await fetch(`https://gist.githubusercontent.com/biaxmachado-jpg/${GIST_ID}/raw/cardapio.json?t=${Date.now()}`);
    const d=await res.json();
    recipes=d.recipes||[];
    menus=d.menus||{};
    shopping=(d.shopping&&Object.keys(d.shopping).length)?d.shopping:JSON.parse(JSON.stringify(DEFAULT_SHOPPING));
    tags=(d.tags&&d.tags.length)?d.tags:JSON.parse(JSON.stringify(DEFAULT_TAGS));
    return true;
  }catch(e){return false;}
}

async function saveToGist(){
  const btn=document.getElementById('btn-save');
  btn.disabled=true;btn.textContent='Salvando...';
  try{
    const res=await fetch(GIST_API,{method:'PATCH',
      headers:{'Authorization':`token ${GH_TOKEN}`,'Accept':'application/vnd.github+json','Content-Type':'application/json'},
      body:JSON.stringify({files:{'cardapio.json':{content:JSON.stringify({recipes,menus,shopping,tags},null,2)}}})
    });
    showToast(res.ok?'✅ Salvo!':'❌ Erro ao salvar.');
  }catch(e){showToast('❌ Sem conexão.');}
  btn.disabled=false;btn.textContent='💾 Salvar';
}

// ────────────────────────────────────────────────────────────────────────────
const byId=id=>recipes.find(r=>r.id===id);
const tagById=id=>tags.find(t=>t.id===id);
function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),3500);}
function closeModal(id){document.getElementById(id).classList.remove('open');}
function openModal(id){document.getElementById(id).classList.add('open');}
function fmtDate(d){return d.toLocaleString('pt-BR',{timeZone:'America/Sao_Paulo',weekday:'long',day:'2-digit',month:'long',year:'numeric',hour:'2-digit',minute:'2-digit'});}

function renderTagBadges(tagIds){
  return(tagIds||[]).map(tid=>{const t=tagById(tid);if(!t)return'';return`<span class="tag" style="background:${t.color}">${t.name}</span>`;}).join('');
}

function checkPin(){
  if(document.getElementById('pin-inp').value===ADMIN_PIN){
    isAdmin=true;
    closeModal('m-pin');
    document.getElementById('admin-pill').classList.remove('hidden');
    document.getElementById('btn-admin').classList.add('hidden');

}

// ────────────────────────────────────────────────────────────────────────────
// CARDÁPIO RENDER
// ────────────────────────────────────────────────────────────────────────────
function renderCardapio(){
  document.getElementById('loading-c').classList.add('hidden');
  const g=document.getElementById('cards-grid');
  g.classList.remove('hidden');
  g.innerHTML=DAYS.map(({key,cook,label,serves,color})=>{
    const menu=menus[key]||{recipeIds:[],notes:''};
    const editBtn=isAdmin?`<button class="card-edit-btn" onclick="openMenuEdit('${key}')">✏ Editar</button>`:'';
    const items=!menu.recipeIds||menu.recipeIds.length===0
      ?`<div class="empty-slot">Nenhuma receita definida</div>`
      :menu.recipeIds.map((rid,i)=>{
          const r=byId(rid);if(!r)return'';
          return`<div class="recipe-item" style="${i===menu.recipeIds.length-1?'border-bottom:none':''}">
            <div class="rdot" style="background:${color}"></div>
            <div>
              <div class="rname">${r.name}</div>
              <div class="tags-row">${renderTagBadges(r.tags)}</div>
              ${r.url?`<a href="${r.url}" target="_blank" class="rlink">🔗 Ver receita</a>`:''}
              ${r.notes&&!r.url?`<div class="rnotes">${r.notes.substring(0,80)}${r.notes.length>80?'...':''}</div>`:''}
            </div>
          </div>`;
        }).join('');
    return`<div class="day-card">
      <div class="card-hd" style="background:${color}">
        <div><div class="card-cook">Cozinhar na ${cook}</div><div class="card-day">${label}</div><div class="card-serves">🍽 ${serves}</div></div>
        ${editBtn}
      </div>
      <div class="card-bd">${items}${menu.notes?`<div class="note-box">💡 ${menu.notes}</div>`:''}</div>
    </div>`;
  }).join('');
}

// ────────────────────────────────────────────────────────────────────────────
// TAG MANAGER (admin only)
// ────────────────────────────────────────────────────────────────────────────
function renderTagManager(){
  const area=document.getElementById('tag-manager-area');
  if(!isAdmin){area.innerHTML='';return;}
  area.innerHTML=`<div class="tag-manager">
    <div class="tag-manager-title">🏷 Gerenciar marcadores</div>
    <div class="tags-list">${tags.map(t=>`<div class="tag-item" style="background:${t.color}">
      ${t.name}
      <button class="tag-del-btn" onclick="deleteTag('${t.id}')" title="Remover">×</button>
    </div>`).join('')}</div>
    <div class="add-tag-row">
      <input class="tag-name-input" id="new-tag-name" placeholder="Nome do marcador" maxlength="20" onkeydown="if(event.key==='Enter')addTag()"/>
      <input type="color" class="tag-color-input" id="new-tag-color" value="#4A7C59" title="Cor"/>
      <button class="btn-sm" onclick="addTag()">+ Adicionar</button>
    </div>
  </div>`;
}

function addTag(){
  const name=document.getElementById('new-tag-name').value.trim();
  const color=document.getElementById('new-tag-color').value;
  if(!name)return;
  tags.push({id:'t'+Date.now(),name,color});
  document.getElementById('new-tag-name').value='';
  renderAll();
}
function deleteTag(id){
  if(!confirm('Remover este marcador?'))return;
  tags=tags.filter(t=>t.id!==id);
  recipes.forEach(r=>{if(r.tags)r.tags=r.tags.filter(tid=>tid!==id);});
  renderAll();
}

// ────────────────────────────────────────────────────────────────────────────
// RECEITAS RENDER
// ────────────────────────────────────────────────────────────────────────────
function filterByTag(tagId, el){
  activeTagFilter=tagId;
  document.querySelectorAll('.filter-chip').forEach(c=>c.classList.remove('active'));
  el.classList.add('active');
  renderReceitas();
}

function renderFilterBar(){
  const bar=document.getElementById('filter-bar');
  bar.innerHTML=`<button class="filter-chip ${activeTagFilter==='todos'?'active':''}" data-tag="todos" onclick="filterByTag('todos',this)">Todas</button>`
    +tags.map(t=>`<button class="filter-chip ${activeTagFilter===t.id?'active':''}" data-tag="${t.id}" onclick="filterByTag('${t.id}',this)" style="${activeTagFilter===t.id?`background:${t.color};border-color:${t.color};color:#fff`:''}">${t.name}</button>`).join('');
}

function renderReceitas(){
  renderTagManager();
  renderFilterBar();
  document.getElementById('btn-add-recipe').classList.toggle('hidden',!isAdmin);
  const filtered=activeTagFilter==='todos'?recipes:recipes.filter(r=>(r.tags||[]).includes(activeTagFilter));
  document.getElementById('r-count').textContent=`${filtered.length} de ${recipes.length} receitas`;
  document.getElementById('recipes-grid').innerHTML=filtered.map(r=>{
    const delBtn=isAdmin?`<button class="btn-del" onclick="deleteRecipe('${r.id}')" title="Remover">🗑</button>`:'';
    const editBtn=isAdmin?`<button class="btn-del" onclick="editRecipe('${r.id}')" title="Editar" style="color:#78B060">✏</button>`:'';
    return`<div class="recipe-card">
      <div class="rc-hd"><div class="rc-name">${r.name}</div><div style="display:flex;gap:3px">${editBtn}${delBtn}</div></div>
      <div class="tags-row">${renderTagBadges(r.tags)}</div>
      ${r.url?`<a href="${r.url}" target="_blank" class="rlink">🔗 Abrir receita</a>`:`<span class="no-link">Sem link</span>`}
      ${r.notes?`<div class="rnotes">${r.notes}</div>`:''}
    </div>`;
  }).join('') || `<div style="grid-column:1/-1;text-align:center;color:#9AB89A;padding:30px;font-style:italic">Nenhuma receita com este marcador.</div>`;
}

// RECIPE CRUD
// ────────────────────────────────────────────────────────────────────────────
function openAddRecipe(){
  editingRecipeId=null;
  document.getElementById('m-recipe-title').textContent='Nova Receita';
  document.getElementById('edit-recipe-id').value='';
  document.getElementById('r-name').value='';
  document.getElementById('r-url').value='';
  document.getElementById('r-notes').value='';
  renderTagSelector([]);
  openModal('m-recipe');
}

function editRecipe(id){
  const r=byId(id);if(!r)return;
  editingRecipeId=id;
  document.getElementById('m-recipe-title').textContent='Editar Receita';
  document.getElementById('edit-recipe-id').value=id;
  document.getElementById('r-name').value=r.name;
  document.getElementById('r-url').value=r.url||'';
  document.getElementById('r-notes').value=r.notes||'';
  renderTagSelector(r.tags||[]);
  openModal('m-recipe');
}

function renderTagSelector(selected){
  document.getElementById('tag-selector').innerHTML=tags.map(t=>`
    <div class="tag-sel-chip ${selected.includes(t.id)?'sel':''}" style="background:${t.color}" onclick="toggleTagSel(this,'${t.id}')">${t.name}</div>
  `).join('');
}
function toggleTagSel(el,id){el.classList.toggle('sel');}

function saveRecipe(){
  const name=document.getElementById('r-name').value.trim();
  if(!name)return;
  const selTags=[...document.querySelectorAll('#tag-selector .tag-sel-chip.sel')].map(el=>el.getAttribute('onclick').match(/'([^']+)'/)[1]);
  const rData={
    name,
    url:document.getElementById('r-url').value.trim(),
    notes:document.getElementById('r-notes').value.trim(),
    tags:selTags
  };
  if(editingRecipeId){
    const idx=recipes.findIndex(r=>r.id===editingRecipeId);
    if(idx>-1)recipes[idx]={...recipes[idx],...rData};
  }else{
    recipes.push({id:'r'+Date.now(),...rData});
  }
  closeModal('m-recipe');renderAll();
}

function deleteRecipe(id){
  if(!confirm('Remover esta receita?'))return;
  recipes=recipes.filter(r=>r.id!==id);
  Object.keys(menus).forEach(k=>{menus[k].recipeIds=(menus[k].recipeIds||[]).filter(rid=>rid!==id);});
  renderAll();
}

// MENU CRUD
// ────────────────────────────────────────────────────────────────────────────
function openMenuEdit(key){
  editingDayKey=key;
  const day=DAYS.find(d=>d.key===key);
  document.getElementById('m-menu-title').textContent=`Cardápio — ${day.label}`;
  document.getElementById('menu-note').value=menus[key]?.notes||'';
  const sel=(menus[key]?.recipeIds||[]);
  document.getElementById('recipe-checklist').innerHTML=recipes.map(r=>{
    const on=sel.includes(r.id);
    return`<div class="chk-item ${on?'sel':''}" onclick="toggleRecipeSel(this,'${r.id}')">
      <div class="chkbox">${on?'✓':''}</div>
      <div><div style="font-size:13px;font-weight:600">${r.name}</div><div class="tags-row">${renderTagBadges(r.tags)}</div></div>
    </div>`;
  }).join('');
  openModal('m-menu');
}
function toggleRecipeSel(el){el.classList.toggle('sel');el.querySelector('.chkbox').textContent=el.classList.contains('sel')?'✓':'';}
function saveMenu(){
  const selIds=[...document.querySelectorAll('#recipe-checklist .chk-item.sel')]
    .map(el=>el.getAttribute('onclick').match(/'([^']+)'/)[1]);
  menus[editingDayKey]={recipeIds:selIds,notes:document.getElementById('menu-note').value.trim()};
  closeModal('m-menu');renderAll();
}

function switchShopTab(tab){
  currentShopTab=tab;

  document.getElementById('tab-mensal').classList.toggle('active',tab==='mensal');
  document.getElementById('gen-container').innerHTML='';
  renderShop();
}

function renderShop(){
  const list=shopping[currentShopTab];
  const c=document.getElementById('shop-container');
  if(!list){c.innerHTML='';return;}
  c.innerHTML=list.categories.map((cat,ci)=>{
    const itemsHtml=cat.items.map((item,ii)=>{
      const k=`${ci}-${ii}`;
      const on=checks[currentShopTab][k]||false;
      const qtyPart=isAdmin
        ?`<input class="iqty-input" value="${item.qty}" onchange="updateQty(${ci},${ii},this.value)" onclick="event.stopPropagation()"/>`
        :`<span class="iqty">${item.qty}</span>`;
      const del=isAdmin?`<button class="idel" onclick="delItem(${ci},${ii})">🗑</button>`:'';
      return`<div class="shop-item ${on?'checked':''}" id="si-${ci}-${ii}">
        <div class="ichk ${on?'on':''}" onclick="toggleCheck(${ci},${ii})">${on?'✓':''}</div>
        <span class="iname">${item.name}</span>
        <div style="display:flex;align-items:center;gap:6px">${qtyPart}${del}</div>
      </div>`;
    }).join('');
    const marked=cat.items.filter((_,ii)=>checks[currentShopTab][`${ci}-${ii}`]).length;
    const addRow=isAdmin?`<div class="add-item-row">
      <input class="aii" id="ni-${ci}" placeholder="Novo item..." onkeydown="if(event.key==='Enter')addItem(${ci})"/>
      <input class="aiq" id="nq-${ci}" placeholder="Qtd..." onkeydown="if(event.key==='Enter')addItem(${ci})"/>
      <button class="aib" onclick="addItem(${ci})">+</button>
    </div>`:'';
    return`<div class="shop-category">
      <div class="shop-cat-hd" onclick="toggleCat(${ci})">
        <span>${cat.name}</span>
        <span class="shop-cat-count">${marked}/${cat.items.length}</span>
      </div>
      <div class="shop-items" id="cat-${ci}">${itemsHtml}</div>
      ${addRow}
    </div>`;
  }).join('');
  if(isAdmin){
    c.innerHTML+=`<button class="btn-add" style="margin-top:10px" onclick="addCategory()">+ Nova categoria</button>`;
  }
}

function toggleCat(ci){const e=document.getElementById(`cat-${ci}`);e.style.display=e.style.display==='none'?'':'none';}
function toggleCheck(ci,ii){const k=`${ci}-${ii}`;checks[currentShopTab][k]=!checks[currentShopTab][k];renderShop();}
function checkAll(){const l=shopping[currentShopTab];l.categories.forEach((c,ci)=>c.items.forEach((_,ii)=>{checks[currentShopTab][`${ci}-${ii}`]=true;}));renderShop();}
function uncheckAll(){checks[currentShopTab]={};renderShop();}
function resetChecks(){checks[currentShopTab]={};renderShop();showToast('✅ Marcações resetadas!');}
function updateQty(ci,ii,v){shopping[currentShopTab].categories[ci].items[ii].qty=v;}
function delItem(ci,ii){
  if(!confirm('Remover item?'))return;
  shopping[currentShopTab].categories[ci].items.splice(ii,1);
  checks[currentShopTab]={};renderShop();
}
function addItem(ci){
  const n=document.getElementById(`ni-${ci}`).value.trim();
  if(!n)return;
  shopping[currentShopTab].categories[ci].items.push({name:n,qty:document.getElementById(`nq-${ci}`).value.trim()||'1 unidade'});
  document.getElementById(`ni-${ci}`).value='';
  document.getElementById(`nq-${ci}`).value='';
  renderShop();
}
function addCategory(){
  const name=prompt('Nome da categoria (use emoji + nome):');
  if(!name)return;
  shopping[currentShopTab].categories.push({name,items:[]});
  renderShop();
}

// ────────────────────────────────────────────────────────────────────────────
// GENERATE + SEND
// ────────────────────────────────────────────────────────────────────────────
async function generateAndSend(){
  const list=shopping[currentShopTab];
  const result=[];
  list.categories.forEach((cat,ci)=>{
    const itens=cat.items.filter((_,ii)=>checks[currentShopTab][`${ci}-${ii}`]);
    if(itens.length>0)result.push({categoria:cat.name,itens:itens.map(i=>({nome:i.name,qty:i.qty}))});
  });

  const container=document.getElementById('gen-container');

  if(result.length===0){
    container.innerHTML=`<div class="gen-list"><div class="empty-gen">Nenhum item marcado! Marque o que precisa comprar primeiro.</div></div>`;
    return;
  }

  const now=new Date();
  const tabLabel=currentShopTab==='semanal'?'Semanal':'Mensal';

  // Render lista na tela
  container.innerHTML=`<div class="gen-list">
    <div class="gen-hd">
      <div><div class="gen-title">🛒 Lista de Compras ${tabLabel}</div><div class="gen-date">Gerada em ${fmtDate(now)}</div></div>
      <div class="gen-actions">
        <button class="btn-print" onclick="window.print()">🖨 Imprimir</button>
      </div>
    </div>
    ${result.map(({categoria,itens})=>`<div class="gen-cat">
      <div class="gen-cat-name">${categoria}</div>
      ${itens.map(i=>`<div class="gen-item"><span>${i.nome}</span><span class="gen-qty">${i.qty}</span></div>`).join('')}
    </div>`).join('')}
    <div id="send-status" class="sending-msg">📲 Enviando para o WhatsApp...</div>
  </div>`;

  container.scrollIntoView({behavior:'smooth',block:'start'});

  // Enviar para WhatsApp via n8n
  try{
    const res=await fetch(WH_LISTA,{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({lista:result,tab:tabLabel})
    });
    const data=await res.json();
    document.getElementById('send-status').textContent=data.ok?'✅ Lista enviada para o WhatsApp da Bia!':'⚠️ Lista gerada, mas não foi possível enviar.';
  }catch(e){
    document.getElementById('send-status').textContent='⚠️ Lista gerada mas falhou ao enviar. Verifique conexão.';
  }
}

// ────────────────────────────────────────────────────────────────────────────
// RENDER ALL
// ────────────────────────────────────────────────────────────────────────────
function renderAll(){renderCardapio();renderReceitas();renderShop();}

document.querySelectorAll('.modal-overlay').forEach(o=>o.addEventListener('click',e=>{if(e.target===o)o.classList.remove('open');}));

(async()=>{
  const ok=await loadFromGist();
  if(ok)renderAll();
  else document.getElementById('loading-c').innerHTML='❌ Erro ao carregar. Verifique a conexão.';
})();
</script>
